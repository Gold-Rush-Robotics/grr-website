services:
  # s3 compatible bucket to simulate for dev; in prod we are probably using cloudflare r2
  minio:
    image: minio/minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 admin password; do
        sleep 1;
      done;
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-photos};
      /usr/bin/mc anonymous set download local/${S3_BUCKET:-photos};
      exit 0;
      "

volumes:
  minio-data:
